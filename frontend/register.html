<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create a secure account with enterprise-grade password protection.">
    <title>Register | Secure Auth System</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <!-- Logo -->
            <div class="auth-logo">
                <div class="shield-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                        <path d="M9 12l2 2 4-4" stroke="#00ff88"></path>
                    </svg>
                </div>
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Register with a strong, secure password</p>
            </div>

            <!-- Alert -->
            <div id="register-alert" class="alert"></div>

            <!-- Registration Form -->
            <form id="register-form" autocomplete="off" novalidate>
                <!-- Username -->
                <div class="form-group">
                    <label class="form-label" for="username">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        Username
                    </label>
                    <input
                        type="text"
                        id="username"
                        class="form-input"
                        placeholder="Enter your username"
                        autocomplete="off"
                        maxlength="30"
                        required
                    >
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                        Password
                    </label>
                    <input
                        type="password"
                        id="password"
                        class="form-input"
                        placeholder="Create a strong password"
                        autocomplete="off"
                        maxlength="128"
                        required
                    >

                    <!-- Password Strength Meter -->
                    <div class="strength-container">
                        <div class="strength-bar-track">
                            <div id="strength-bar-fill" class="strength-bar-fill"></div>
                        </div>
                        <span id="strength-label" class="strength-label"></span>
                    </div>

                    <!-- Password Rules Checklist -->
                    <div class="rules-list">
                        <div id="rule-length" class="rule-item">
                            <span class="rule-icon"></span>
                            <span>12+ characters</span>
                        </div>
                        <div id="rule-uppercase" class="rule-item">
                            <span class="rule-icon"></span>
                            <span>1 uppercase</span>
                        </div>
                        <div id="rule-lowercase" class="rule-item">
                            <span class="rule-icon"></span>
                            <span>1 lowercase</span>
                        </div>
                        <div id="rule-digit" class="rule-item">
                            <span class="rule-icon"></span>
                            <span>1 digit</span>
                        </div>
                        <div id="rule-special" class="rule-item">
                            <span class="rule-icon"></span>
                            <span>1 special char</span>
                        </div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label class="form-label" for="confirm-password">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                        Confirm Password
                    </label>
                    <input
                        type="password"
                        id="confirm-password"
                        class="form-input"
                        placeholder="Re-enter your password"
                        autocomplete="off"
                        maxlength="128"
                        required
                    >
                </div>

                <button type="submit" id="register-btn" class="btn-submit">
                    Create Secure Account
                </button>
            </form>

            <div class="auth-footer">
                Already have an account? <a href="/login">Sign In</a>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/password-strength.js"></script>
    <script src="/static/js/register.js"></script>
</body>
</html>
